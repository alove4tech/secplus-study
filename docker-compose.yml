services:
  secplus-study:
    build: .
    container_name: secplus-study
    restart: unless-stopped

    # Resource limits for N100 mini PC
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

    env_file:
      - .env

    ports:
      - "3001:3000"

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - secplus-study-net

    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache

volumes:
  secplus-study-cache:
    driver: local

networks:
  secplus-study-net:
    driver: bridge
